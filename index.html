<body>

  <!-- ========================= -->
  <!-- FULL-WIDTH PREVIEW SYSTEM -->
  <!-- ========================= -->
  <div id="previewWrapper" style="width:100%;">

    <!-- Browser-style tabs -->
    <div id="previewTabs" style="display:flex; gap:4px; padding:10px 15px; border-bottom:1px solid #ccc; background:#f5f5f5;">
      <!-- Tabs will be injected here by JS -->
    </div>

    <!-- Preview page containers -->
    <div id="previewPages" style="width:100%; padding:20px 0;">
      <!-- Each preview page will be injected here -->
    </div>

  </div>

  <!-- ========================= -->
  <!-- YOUR EXISTING LAYOUT HERE -->
  <!-- ========================= -->

  <aside class="sidebar">
    <!-- your sidebar content stays unchanged -->
  </aside>

  <main id="contentArea">
    <!-- your main builder content stays unchanged -->
  </main>


  <!-- ========================= -->
  <!-- POPUP BOX (UPDATED)      -->
  <!-- ========================= -->
  <div id="popup-box" class="popup-box" style="display:none;">
    <div class="popup-content">

      <h3>Edit Link</h3>

      <label>Link URL:</label>
      <input type="text" id="popup-link-url">

      <label>Link Text:</label>
      <input type="text" id="popup-link-text">

      <label>Select Page:</label>
      <div id="page-options">
        <button class="page-option" data-page="page1.html">Page 1</button>
        <button class="page-option" data-page="page2.html">Page 2</button>
        <button class="page-option" data-page="page3.html">Page 3</button>
        <button class="page-option" data-page="page4.html">Page 4</button>
        <button class="page-option" data-page="page5.html">Page 5</button>
        <button class="page-option" data-page="page6.html">Page 6</button>
      </div>

      <div class="popup-buttons" style="margin-top:20px; display:flex; gap:10px; justify-content:flex-end;">
        <button id="popup-save">Save</button>
        <button id="popup-cancel">Cancel</button>
        <button id="popup-preview">Preview</button>
      </div>

    </div>
  </div>

</body>
