<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tabbed Business Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  color: #222;
}

/* HERO BANNER */
/* HERO BANNER WITH BACKGROUND IMAGE */
.hero-banner {
  position: relative;
  padding: 140px 20px;
  text-align: center;
  color: #fff;
  background: url('https://picsum.photos/1200/800?25') center/cover no-repeat; /* <-- your image */
  overflow: hidden;
}

/* Dark overlay so text stays readable */
.hero-banner::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.8); /* adjustable darkness */
  backdrop-filter: blur(1px);
}

/* Keep text above overlay */
.hero-inner {
  position: relative;
  max-width: 900px;
  margin: 0 auto;
}

.hero-title {
  font-size: 48px;
  font-weight: 800;
  margin-bottom: 14px;
}

.hero-title span {
  color: #e5e5e5; /* soft silver */
}


.hero-tagline {
  font-size: 20px;
  color: #e2e8f0;
  max-width: 640px;
  margin: 0 auto 26px;
}

.cta-btn {
  padding: 14px 34px;
  background:#fff;
  border-radius: 999px;
  color: #000;
  font-weight: 600;
  text-decoration: none;
  
  transition: 0.3s;
  border: none;
  cursor: pointer;
  font-size: 14px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.cta-btn:hover {
  transform: translateY(-3px);
}


/* Header below hero (for gallery title) */
.section-header {
  padding: 30px 20px 10px;
  text-align: center;
}
.section-header h2 {
  margin: 0;
  font-size: 26px;
}
.section-header p {
  margin-top: 8px;
  color: #666;
}

/* Tabs */
.filters {
  text-align: center;
  padding: 15px 10px;
  background: #fff;
  border-top: 1px solid #ddd;
  border-bottom: 1px solid #ddd;
}
.filters button {
  padding: 8px 16px;
  margin: 4px;
  border: none;
  background: #ddd;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.2s;
}
.filters button p {
  margin: 0;
}
.filters button.active,
.filters button:hover {
  background: #333;
  color: #fff;
}

/* Gallery layout */
.gallery {
  columns: 3;
  column-gap: 12px;
  padding: 20px;
}
.gallery-item {
  margin-bottom: 12px;
  break-inside: avoid;
  cursor: pointer;
}

/* Fixed image size */
.gallery-item img {
  width: 100%;
  height: 350px;
  object-fit: cover;
  border-radius: 8px;
  transition: 0.3s;
}
.gallery-item:hover img {
  opacity: 0.85;
  transform: scale(1.02);
}

/* Lightbox */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}
.lightbox .close-area {
  position: absolute;
  inset: 0;
  cursor: pointer;
}

/* Responsive */
@media (max-width: 900px) {
  .gallery { columns: 2; }
  .hero-title { font-size: 34px; }
}
@media (max-width: 600px) {
  .gallery { columns: 1; }
  .hero-banner { padding: 90px 16px; }
  .hero-title { font-size: 28px; }
  .hero-tagline { font-size: 16px; }
}
</style>
</head>

<body>

<!-- HERO BANNER -->
<section class="hero-banner">
  <div class="hero-inner">
    <h1 class="hero-title" id="bizHeadline">
      Premium <span>Professional Services</span>
    </h1>
    <p class="hero-tagline" id="bizTagline">
      Delivering exceptional quality with a trusted modern approach.
    </p>
  </div>
</section>


<!-- GALLERY SECTION HEADER -->
<div class="section-header" id="gallery">
  <h2>Business Gallery</h2>
  <p>Tabbed galleries with fixed image sizes and lightbox.</p>
</div>

<!-- TABS -->
<div class="filters">
  <button class="active" data-gallery="gallery1"><p>Gallery 1</p></button>
  <button data-gallery="gallery2"><p>Gallery 2</p></button>
  <button data-gallery="gallery3"><p>Gallery 3</p></button>
  <button data-gallery="gallery4"><p>Gallery 4</p></button>
</div>

<!-- GALLERY 1 -->
<div class="gallery-group" id="gallery1">
  <div class="gallery">
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?1" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?2" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?3" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?4" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?5" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?6" alt=""></div>
  </div>
</div>

<!-- GALLERY 2 -->
<div class="gallery-group" id="gallery2" style="display:none;">
  <div class="gallery">
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?7" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?8" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?9" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?10" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?11" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?12" alt=""></div>
  </div>
</div>

<!-- GALLERY 3 -->
<div class="gallery-group" id="gallery3" style="display:none;">
  <div class="gallery">
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?13" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?14" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?15" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?16" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?17" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?18" alt=""></div>
  </div>
</div>

<!-- GALLERY 4 -->
<div class="gallery-group" id="gallery4" style="display:none;">
  <div class="gallery">
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?19" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?20" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?21" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?22" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?23" alt=""></div>
    <div class="gallery-item"><img src="https://picsum.photos/1200/800?24" alt=""></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="close-area"></div>
  <img id="lightbox-img" alt="">
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  // Tabs
  const tabButtons = document.querySelectorAll(".filters button");
  const galleryGroups = document.querySelectorAll(".gallery-group");

  tabButtons.forEach(button => {
    button.addEventListener("click", () => {
      tabButtons.forEach(b => b.classList.remove("active"));
      button.classList.add("active");

      const targetId = button.getAttribute("data-gallery");

      galleryGroups.forEach(group => {
        group.style.display = (group.id === targetId) ? "block" : "none";
      });
    });
  });

  // Lightbox
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  document.querySelectorAll(".gallery-item img").forEach(img => {
    img.addEventListener("click", () => {
      lightboxImg.src = img.src;
      lightbox.style.display = "flex";
    });
  });

  document.querySelector(".lightbox .close-area").addEventListener("click", () => {
    lightbox.style.display = "none";
  });
});
</script>

</body>
</html>
